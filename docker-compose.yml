services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/letsencrypt:/letsencrypt
    command:
      - --configFile=/etc/traefik/traefik.yml

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: /app
      STORAGE_ROOT: /app/storage
      LATEX_TEMPLATE_ROOT: /app/storage/latex_templates
      EXPORT_ROOT: /app/storage/exports
      UPLOAD_ROOT: /app/storage/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hocx-backend.rule=Host(`${TRAEFIK_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.hocx-backend.entrypoints=websecure"
      - "traefik.http.routers.hocx-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hocx-backend.priority=100"
      - "traefik.http.services.hocx-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: ${INTERNAL_API_URL}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hocx-frontend.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.hocx-frontend.entrypoints=websecure"
      - "traefik.http.routers.hocx-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hocx-frontend.priority=10"
      - "traefik.http.services.hocx-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:
