services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    env_file:
      - .env
    environment:
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/letsencrypt:/letsencrypt
      # Vom backend generierte Router pro Mandanten-Custom-Domain (siehe traefik_config_service.py)
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    command:
      - --configFile=/etc/traefik/traefik.yml

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: /app
      STORAGE_ROOT: /app/storage
      LATEX_TEMPLATE_ROOT: /app/storage/latex_templates
      EXPORT_ROOT: /app/storage/exports
      UPLOAD_ROOT: /app/storage/uploads
      ABGABEBOX_STORAGE_ROOT: /app/abgabebox-storage
      ABGABEBOX_DB_PASSWORD: ${ABGABEBOX_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CLAMAV_HOST: clamav
      REDIS_URL: redis://redis:6379/0
      TRAEFIK_DYNAMIC_CONFIG_DIR: /app/traefik_dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      # Zugriff auf die von der Abgabebox geschriebenen Dateien fuer Admin-Downloads
      # und zum Loeschen beim "Wieder aufschalten" (siehe submission_service.py).
      # Read-write, da das Haupt-Backend ohnehin voll vertrauenswuerdig ist - die
      # eigentliche Isolationsgrenze ist die restricted DB-Rolle des abgabebox-backend,
      # nicht dieser Mount.
      - ./storage/abgabebox-uploads:/app/abgabebox-storage
      # Generiert die Router fuer Mandanten-Custom-Domains, gemeinsam mit Traefik (ro-Mount oben)
      - ./infra/traefik/dynamic:/app/traefik_dynamic
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    labels:
      - "traefik.enable=true"
      # Main API router (all non-auth paths)
      - "traefik.http.routers.hocx-backend.rule=Host(`${TRAEFIK_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.hocx-backend.entrypoints=websecure"
      - "traefik.http.routers.hocx-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hocx-backend.priority=100"
      - "traefik.http.routers.hocx-backend.service=hocx-backend"
      - "traefik.http.services.hocx-backend.loadbalancer.server.port=8000"
      # Dedicated router for the login endpoint specifically, with rate limiting - narrowly
      # scoped to just POST /api/auth/login (not all of /api/auth/*), since /api/auth/session
      # and /api/auth/tenant-by-domain are read-only, non-brute-forceable, and get polled on
      # every page load/navigation; sharing the login rate-limit budget with them meant a normal
      # user browsing the app or reloading the login page could exhaust it and see broken
      # tenant-branding lookups or spurious "logged out" states.
      - "traefik.http.routers.hocx-auth.rule=Host(`${TRAEFIK_DOMAIN}`) && Path(`/api/auth/login`) && Method(`POST`)"
      - "traefik.http.routers.hocx-auth.entrypoints=websecure"
      - "traefik.http.routers.hocx-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hocx-auth.priority=200"
      - "traefik.http.routers.hocx-auth.service=hocx-auth"
      - "traefik.http.routers.hocx-auth.middlewares=auth-ratelimit"
      - "traefik.http.services.hocx-auth.loadbalancer.server.port=8000"
      # Rate limit: max 10 login attempts per minute per IP
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.burst=5"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.period=1m"

  frontend:
    build:
      context: ./frontend
      target: deps
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: ${INTERNAL_API_URL}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm run build && npm start"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hocx-frontend.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.hocx-frontend.entrypoints=websecure"
      - "traefik.http.routers.hocx-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hocx-frontend.priority=10"
      - "traefik.http.services.hocx-frontend.loadbalancer.server.port=3000"

  # Oeffentliche Abgabebox (kein Login) auf eigener Subdomain, eigener Codebase,
  # eigene restricted DB-Rolle (siehe backend/alembic/versions/0020_abgabebox.py).
  abgabebox-backend:
    build:
      context: ./abgabebox-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ABGABEBOX_DATABASE_URL: ${ABGABEBOX_DATABASE_URL}
      ABGABEBOX_STORAGE_ROOT: /app/storage
      ABGABEBOX_CORS_ORIGIN: https://${TRAEFIK_ABGABEBOX_DOMAIN}
      FRIENDLY_CAPTCHA_SITEKEY: ${FRIENDLY_CAPTCHA_SITEKEY}
      FRIENDLY_CAPTCHA_API_KEY: ${FRIENDLY_CAPTCHA_API_KEY}
      CLAMAV_HOST: clamav
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./abgabebox-backend:/app
      - ./storage/abgabebox-uploads:/app/storage
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.abgabebox-backend.rule=Host(`${TRAEFIK_ABGABEBOX_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.abgabebox-backend.entrypoints=websecure"
      - "traefik.http.routers.abgabebox-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.abgabebox-backend.priority=100"
      - "traefik.http.routers.abgabebox-backend.service=abgabebox-backend"
      - "traefik.http.services.abgabebox-backend.loadbalancer.server.port=8000"
      # Dedizierter Router nur fuer den Upload-POST, mit Rate-Limit gegen Spam/DoS
      # (analog auth-ratelimit) - da dieser Endpoint komplett unauthentifiziert ist.
      - "traefik.http.routers.abgabebox-upload.rule=Host(`${TRAEFIK_ABGABEBOX_DOMAIN}`) && PathPrefix(`/api/public`) && Method(`POST`)"
      - "traefik.http.routers.abgabebox-upload.entrypoints=websecure"
      - "traefik.http.routers.abgabebox-upload.tls.certresolver=letsencrypt"
      - "traefik.http.routers.abgabebox-upload.priority=200"
      - "traefik.http.routers.abgabebox-upload.service=abgabebox-backend"
      - "traefik.http.routers.abgabebox-upload.middlewares=abgabebox-upload-ratelimit"
      - "traefik.http.middlewares.abgabebox-upload-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.abgabebox-upload-ratelimit.ratelimit.burst=3"
      - "traefik.http.middlewares.abgabebox-upload-ratelimit.ratelimit.period=1m"

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 30s
      start_period: 300s
      retries: 5

  abgabebox-frontend:
    build:
      context: ./abgabebox-frontend
      target: deps
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_ABGABEBOX_API_URL: https://${TRAEFIK_ABGABEBOX_DOMAIN}
      INTERNAL_ABGABEBOX_API_URL: http://abgabebox-backend:8000
      NEXT_PUBLIC_FRIENDLY_CAPTCHA_SITEKEY: ${FRIENDLY_CAPTCHA_SITEKEY}
      NEXT_PUBLIC_DEFAULT_TENANT_SLUG: ${NEXT_PUBLIC_DEFAULT_TENANT_SLUG}
    depends_on:
      - abgabebox-backend
    volumes:
      - ./abgabebox-frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm run build && npm start"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.abgabebox-frontend.rule=Host(`${TRAEFIK_ABGABEBOX_DOMAIN}`)"
      - "traefik.http.routers.abgabebox-frontend.entrypoints=websecure"
      - "traefik.http.routers.abgabebox-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.abgabebox-frontend.priority=10"
      - "traefik.http.services.abgabebox-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  clamav_db:
