name: Release images

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
          - name: abgabebox-backend
            context: ./abgabebox-backend
          - name: abgabebox-frontend
            context: ./abgabebox-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/hocx-${{ matrix.service.name }}:${{ github.event.release.tag_name }}
            ghcr.io/${{ env.OWNER_LC }}/hocx-${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
