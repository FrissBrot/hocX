name: CI

on:
  pull_request:
    branches: [main]

jobs:
  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: hocx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run alembic upgrade head against a fresh database
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/hocx_ci
          AUTH_SECRET: ci-migration-check-dummy-secret-0123456789
          ADMIN_AUTH_SECRET: ci-migration-check-dummy-admin-secret-0123456789
        run: alembic upgrade head

  frontend-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [frontend, abgabebox-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
